<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Horários Barcelos">
<meta name="theme-color" content="#0f172a">
<title>Horários Barcelos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f172a;--surface:#1e293b;--card:#263245;--border:#334155;
    --text:#f1f5f9;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;
    --yellow:#facc15;--red:#f87171;--radius:16px
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
  body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}

  .header{padding:env(safe-area-inset-top) 20px 0;background:var(--bg);position:sticky;top:0;z-index:10}
  .header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
  .app-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
  .clock{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
  .header-bar{height:1px;background:var(--border)}

  .main{flex:1;overflow-y:auto;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px)}

  .section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
  .line-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
  .line-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px}
  .line-card:active{transform:scale(.97)}
  .line-num{font-size:26px;font-weight:800;color:var(--accent);letter-spacing:-1px}
  .line-desc{font-size:11px;color:var(--muted);line-height:1.3;font-weight:500}

  .dir-toggle{display:flex;gap:8px;margin-bottom:16px}
  .dir-btn{flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
  .dir-btn:active{transform:scale(.97)}
  .dir-btn.active{border-color:var(--accent);background:rgba(56,189,248,.1);color:var(--accent)}

  .stop-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .stop-item{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
  .stop-item:active{transform:scale(.98)}
  .stop-item.no-times{background:#131f30;border-color:#1e2d3d}
  .stop-item.no-times .stop-name{color:#5a7a8a}
  .stop-item.no-times .stop-next{opacity:.7}
  .stop-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;flex:1;min-width:0;padding-right:8px}
  .stop-next{font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
  .stop-next.green{color:var(--green)}
  .stop-next.yellow{color:var(--yellow)}
  .stop-next.red{color:var(--red)}
  .stop-next.muted{color:var(--muted)}
  .approx-badge{font-size:10px;color:var(--muted);font-weight:500;margin-top:2px;display:block}

  .results{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .results-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px}
  .next-bus-hero{background:rgba(56,189,248,.1);border:1.5px solid rgba(56,189,248,.3);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  .next-bus-time{font-size:36px;font-weight:800;color:var(--accent);letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
  .next-bus-min{font-size:14px;font-weight:700;color:var(--accent);text-align:right}
  .next-bus-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .approx-notice{background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.25);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--yellow);line-height:1.5}
  .time-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .time-chip{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .time-chip.upcoming{background:var(--card);color:var(--text)}
  .time-chip.past{color:var(--border);background:transparent}
  .time-chip.next{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
  .no-more{color:var(--muted);font-size:13px;padding:8px 0}
  .disclaimer{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

  .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer}
  .breadcrumb-back{font-size:22px;color:var(--accent);line-height:1}
  .breadcrumb-text{font-size:14px;color:var(--accent);font-weight:600}

  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-text{font-size:15px;font-weight:500}
  .empty-sub{font-size:13px;margin-top:6px;opacity:.7}

  .hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <span class="app-title">Transportes Barcelos</span>
    <span class="clock" id="clock">--:--</span>
  </div>
  <div class="header-bar"></div>
</div>

<div class="main" id="main">
  <div id="view-lines">
    <p class="section-label" style="margin-top:14px">Escolhe a linha</p>
    <div class="line-grid" id="line-grid"></div>
    <div class="empty">
      <div class="empty-icon">🚌</div>
      <div class="empty-text">Seleciona uma linha</div>
      <div class="empty-sub">para ver paragens e horários</div>
    </div>
  </div>

  <div id="view-stops" class="hidden">
    <div class="breadcrumb" onclick="showLines()">
      <span class="breadcrumb-back">‹</span>
      <span class="breadcrumb-text">Linhas</span>
    </div>
    <div class="dir-toggle" id="dir-toggle"></div>
    <p class="section-label">Paragem</p>
    <div class="stop-list" id="stop-list"></div>
  </div>

  <div id="view-times" class="hidden">
    <div class="breadcrumb" onclick="showStops()">
      <span class="breadcrumb-back">‹</span>
      <span class="breadcrumb-text" id="breadcrumb-line">Paragens</span>
    </div>
    <div class="results" id="results-panel"></div>
  </div>
</div>

// ─── TIME UTILS ───────────────────────────────────────────────────────────────
function nowMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}
function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minsToStr(mins) {
  const h = Math.floor(mins / 60).toString().padStart(2,'0');
  const m = (mins % 60).toString().padStart(2,'0');
  return `${h}:${m}`;
}
function formatCountdown(mins) {
  if (mins <= 0) return 'agora';
  if (mins === 1) return '1 min';
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m === 0 ? `${h}h` : `${h}h${m}m`;
}

// Interpolação linear entre paragens com horário
function getApproxTimes(stops, idx) {
  let prevIdx = -1, nextIdx = -1;
  for (let i = idx - 1; i >= 0; i--) {
    if (stops[i].times) { prevIdx = i; break; }
  }
  for (let i = idx + 1; i < stops.length; i++) {
    if (stops[i].times) { nextIdx = i; break; }
  }
  if (prevIdx === -1 && nextIdx === -1) return null;
  if (prevIdx === -1) return { times: stops[nextIdx].times, approx: true };
  if (nextIdx === -1) return { times: stops[prevIdx].times, approx: true };

  const prev = stops[prevIdx].times;
  const next = stops[nextIdx].times;
  const frac = (idx - prevIdx) / (nextIdx - prevIdx);
  const len = Math.min(prev.length, next.length);
  const result = [];
  for (let i = 0; i < len; i++) {
    const pMin = parseTime(prev[i]);
    const nMin = parseTime(next[i]);
    result.push(minsToStr(Math.round(pMin + frac * (nMin - pMin))));
  }
  return { times: result, approx: true };
}

function getEffectiveTimes(stops, idx) {
  const s = stops[idx];
  if (s.times) return { times: s.times, approx: false };
  return getApproxTimes(stops, idx);
}

function getNextTime(times) {
  const now = nowMinutes();
  return times ? times.find(t => parseTime(t) >= now) || null : null;
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const view = document.querySelector('[id^="view-"]:not(.hidden)');
  if (view && view.id === 'view-stops') renderStopList();
  if (view && view.id === 'view-times') renderResults();
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function showView(id) {
  ['view-lines','view-stops','view-times'].forEach(v =>
    document.getElementById(v).classList.toggle('hidden', v !== id));
}
function showLines() {
  selectedLine = null; selectedStop = null; selectedDir = 0;
  showView('view-lines');
}
function showStops() {
  selectedStop = null;
  showView('view-stops');
  renderDirToggle();
  renderStopList();
}
function showTimes(stopIdx) {
  selectedStop = stopIdx;
  document.getElementById('breadcrumb-line').textContent =
    `${selectedLine} · ${selectedDir === 0 ? 'Ida' : 'Volta'}`;
  showView('view-times');
  renderResults();
}

// ─── RENDER: Lines ────────────────────────────────────────────────────────────
function renderLines() {
  document.getElementById('line-grid').innerHTML = Object.entries(DATA).map(([id, d]) =>
    `<div class="line-card" onclick="selectLine('${id}')">
      <div class="line-num">${id}</div>
      <div class="line-desc">${d.name}</div>
    </div>`
  ).join('');
}
function selectLine(id) {
  selectedLine = id; selectedDir = 0; selectedStop = null;
  showStops();
}

// ─── RENDER: Direction ────────────────────────────────────────────────────────
function renderDirToggle() {
  document.getElementById('dir-toggle').innerHTML =
    DATA[selectedLine].directions.map((d, i) =>
      `<button class="dir-btn${i === selectedDir ? ' active' : ''}" onclick="selectDir(${i})">${d.label}</button>`
    ).join('');
}
function selectDir(i) {
  selectedDir = i;
  renderDirToggle();
  renderStopList();
}

// ─── RENDER: Stops ────────────────────────────────────────────────────────────
function renderStopList() {
  const stops = DATA[selectedLine].directions[selectedDir].stops;
  const now = nowMinutes();
  document.getElementById('stop-list').innerHTML = stops.map((s, i) => {
    const eff = getEffectiveTimes(stops, i);
    const next = eff ? getNextTime(eff.times) : null;
    let badge = '', cls = 'muted', extra = '';

    if (next) {
      const diff = parseTime(next) - now;
      badge = diff <= 0 ? 'agora' : formatCountdown(diff);
      cls = diff <= 2 ? 'red' : diff <= 10 ? 'yellow' : 'green';
      if (eff.approx) extra = `<span class="approx-badge">~aprox.</span>`;
    } else {
      badge = 'sem mais';
    }

    const noTimesClass = !s.times ? ' no-times' : '';
    return `<div class="stop-item${noTimesClass}" onclick="showTimes(${i})">
      <div class="stop-name">${s.name}${extra}</div>
      <span class="stop-next ${cls}">${badge}</span>
    </div>`;
  }).join('');
}

// ─── RENDER: Results ──────────────────────────────────────────────────────────
function renderResults() {
  const stops = DATA[selectedLine].directions[selectedDir].stops;
  const stop = stops[selectedStop];
  const eff = getEffectiveTimes(stops, selectedStop);
  const now = nowMinutes();
  const panel = document.getElementById('results-panel');

  if (!eff) {
    panel.innerHTML = `<div class="results-title">${stop.name}</div>
      <p class="no-more">Sem dados de horário disponíveis para esta paragem.</p>`;
    return;
  }

  const { times, approx } = eff;
  const upcoming = times.filter(t => parseTime(t) >= now);
  const past = times.filter(t => parseTime(t) < now);

  let html = `<div class="results-title">${stop.name}</div>`;

  if (approx) {
    html += `<div class="approx-notice">
      ⚠️ Esta paragem não tem horário publicado. Os tempos são <strong>estimativas</strong> calculadas com base nas paragens vizinhas. Chegue alguns minutos mais cedo.
    </div>`;
  }

  if (upcoming.length === 0) {
    html += `<p class="no-more">Sem mais autocarros hoje nesta paragem.</p>`;
  } else {
    const next = upcoming[0];
    const diff = parseTime(next) - now;
    html += `<div class="next-bus-hero">
      <div>
        <div class="next-bus-label">Próximo autocarro</div>
        <div class="next-bus-time">${next}</div>
      </div>
      <div style="text-align:right">
        <div class="next-bus-min">${diff <= 0 ? 'Agora' : formatCountdown(diff)}</div>
        <div class="next-bus-label">espera</div>
      </div>
    </div>`;

    if (upcoming.length > 1) {
      html += `<div style="margin-top:12px">
        <div class="results-title" style="margin-bottom:8px">Seguintes</div>
        <div class="time-list">
          ${upcoming.slice(1).map(t => `<span class="time-chip upcoming">${t}</span>`).join('')}
        </div>
      </div>`;
    }
  }

  if (past.length > 0) {
    html += `<div style="margin-top:14px">
      <div class="results-title" style="margin-bottom:8px">Já passaram</div>
      <div class="time-list">
        ${past.map(t => `<span class="time-chip past">${t}</span>`).join('')}
      </div>
    </div>`;
  }

  html += `<div class="disclaimer">Horários estimados — chegue 10 min antes. Sujeito a alterações. Atualizado em 12-09-2025.</div>`;
  panel.innerHTML = html;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderLines();
updateClock();
setInterval(updateClock, 15000);
</script>
</body>
</html>
