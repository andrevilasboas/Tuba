<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Horários Barcelos">
  <meta name="theme-color" content="#0f172a">
  <title>Horários Barcelos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div>
        <div class="app-title">Transportes Barcelos</div>
        <div class="app-subtitle">Mini-autocarros urbanos</div>
      </div>
      <span class="clock" id="clock">--:--</span>
    </div>
  </header>

  <!-- 3-column layout -->
  <div class="layout">

    <!-- Col 1: Lines + Direction -->
    <div class="panel panel-lines" id="panel-lines">
      <div class="panel-header">
        <div class="panel-title">Linha</div>
      </div>
      <div class="panel-body">
        <div class="line-grid" id="line-grid"></div>
        <div id="dir-toggle"></div>
      </div>
    </div>

    <!-- Col 2: Stops -->
    <div class="panel panel-stops hidden" id="panel-stops">
      <!-- Mobile breadcrumb -->
      <div class="breadcrumb" onclick="goLines()">
        <span class="breadcrumb-back">‹</span>
        <span class="breadcrumb-text">Linhas</span>
      </div>
      <div class="panel-header">
        <div class="panel-title">Paragem</div>
      </div>
      <div class="panel-body">
        <div class="stop-list" id="stop-list"></div>
      </div>
    </div>

    <!-- Col 3: Results -->
    <div class="panel panel-results hidden" id="panel-results">
      <!-- Mobile breadcrumb -->
      <div class="breadcrumb" onclick="goStops()">
        <span class="breadcrumb-back">‹</span>
        <span class="breadcrumb-text">Paragens</span>
      </div>
      <div class="panel-header">
        <div class="panel-title" id="results-panel-title">Horários</div>
      </div>
      <div class="panel-body" id="results-body">
        <div class="empty-state">
          <div class="empty-icon">🚌</div>
          <div class="empty-text">Seleciona uma paragem</div>
          <div class="empty-sub">para ver os próximos autocarros</div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
